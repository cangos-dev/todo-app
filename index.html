<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    input {
      width: 70%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    li {
      display: flex;
      align-items: flex-start; /* 🔥 важно для переноса */
      gap: 10px;
      justify-content: space-between;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;
      cursor: grab;

      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.25s ease forwards;

      transition: transform 0.15s ease, background 0.2s ease;
    }

    li:hover {
      background: #eee;
    }

    li:active {
      cursor: grabbing;
      transform: scale(1.02);
    }

    /* 🔥 ТЕКСТ (фикс) */
    li span {
      flex: 1;
      display: inline-block;
      position: relative;

      max-width: 100%;
      white-space: normal;
      word-break: break-word;

      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    /* 🔥 линия только по тексту */
    li span::after {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 0%;
      height: 2px;
      background: #333;
      transform: translateY(-50%);
      transition: width 0.25s ease;
    }

    li button {
      background: #ff4d4d;
      flex-shrink: 0; /* 🔥 кнопки не сжимаются */
    }

    li button:first-child {
      background: #4CAF50;
    }

    /* ✔️ выполнено (плавно) */
    .completed {
      opacity: 0.6;
      transform: scale(0.98);
    }

    .completed::after {
      width: 100%;
    }

    /* 🔘 фильтр */
    .active-filter {
      background: #333;
    }

    /* ✨ появление */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ❌ удаление */
    .removing {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.95);
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>Список задач</h1>

    <div class="controls">
      <button onclick="setFilter('all')" id="filter-all">Все</button>
      <button onclick="setFilter('active')" id="filter-active">Активные</button>
      <button onclick="setFilter('completed')" id="filter-completed">Выполненные</button>
    </div>

    <input type="text" id="taskInput" placeholder="Новая задача">
    <button onclick="addTask()">Добавить</button>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>

</body>
</html>
