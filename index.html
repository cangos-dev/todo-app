<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;

      cursor: grab;

      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 0.25s ease forwards;

      transition: all 0.2s ease;
    }

    li:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    li:active {
      cursor: grabbing;
    }

    li span {
      flex: 1;
      word-break: break-word;
      line-height: 1.4;
      cursor: pointer;
    }

    li button {
      background: #ff4d4d;
    }

    li button:first-child {
      background: #4CAF50;
    }

    .completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .active-filter {
      background: #333;
    }

    .removing {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(30px);
      }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Список задач</h1>

  <div class="controls">
    <button onclick="setFilter('all')">Все</button>
    <button onclick="setFilter('active')">Активные</button>
    <button onclick="setFilter('completed')">Выполненные</button>
  </div>

  <input type="text" id="searchInput" placeholder="Поиск задач">
  <input type="text" id="taskInput" placeholder="Новая задача">
  <button onclick="addTask()">Добавить</button>
  <button onclick="clearCompleted()">Очистить выполненные</button>

  <ul id="taskList"></ul>
</div>

<script>
const input = document.getElementById("taskInput");
const list = document.getElementById("taskList");
const searchInput = document.getElementById("searchInput");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

window.onload = renderTasks;

function addTask() {
  const text = input.value.trim();
  if (text === "") return;

  tasks.push({ text, completed: false });

  saveAndRender();
  input.value = "";
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function saveAndRender() {
  save();
  renderTasks();
}

function renderTasks() {
  list.innerHTML = "";

  const search = searchInput.value.toLowerCase();

  tasks.forEach((task, index) => {
    if (currentFilter === "active" && task.completed) return;
    if (currentFilter === "completed" && !task.completed) return;

    if (search && !task.text.toLowerCase().includes(search)) return;

    const li = document.createElement("li");

    if (task.completed) {
      li.classList.add("completed");
    }

    const span = document.createElement("span");
    span.textContent = task.text;

    // 👉 редактирование
    span.onclick = () => enableEdit(li, index);

    const toggleBtn = document.createElement("button");
    toggleBtn.textContent = "✔";
    toggleBtn.onclick = () => {
      tasks[index].completed = !tasks[index].completed;
      saveAndRender();
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "✖";
    deleteBtn.onclick = () => {
      li.classList.add("removing");
      setTimeout(() => {
        tasks.splice(index, 1);
        saveAndRender();
      }, 250);
    };

    li.appendChild(span);
    li.appendChild(toggleBtn);
    li.appendChild(deleteBtn);

    list.appendChild(li);
  });
}

function clearCompleted() {
  tasks = tasks.filter(t => !t.completed);
  saveAndRender();
}

function setFilter(filter) {
  currentFilter = filter;
  renderTasks();
}

searchInput.addEventListener("input", renderTasks);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") addTask();
});


// ✏️ INLINE РЕДАКТИРОВАНИЕ

function enableEdit(li, index) {
  const input = document.createElement("input");
  input.type = "text";
  input.value = tasks[index].text;

  li.innerHTML = "";
  li.appendChild(input);

  input.focus();

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") saveEdit(input, index);
    if (e.key === "Escape") renderTasks();
  });

  input.addEventListener("blur", () => {
    saveEdit(input, index);
  });
}

function saveEdit(input, index) {
  const newText = input.value.trim();

  if (newText === "") {
    renderTasks();
    return;
  }

  tasks[index].text = newText;
  saveAndRender();
}
</script>

</body>
</html>
