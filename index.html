<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    input {
      width: 70%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;
      cursor: grab;

      /* ✨ АНИМАЦИЯ ПОЯВЛЕНИЯ */
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.3s ease forwards;
    }

    li:hover {
      background: #eee;
    }

    li:active {
      cursor: grabbing;
      transform: scale(1.02);
    }

    li span {
      flex: 1;
      margin-left: 10px;
      cursor: pointer;
    }

    li button {
      margin-left: 5px;
      background: #ff4d4d;
    }

    li button:first-child {
      background: #4CAF50;
    }

    /* ✔️ выполнено */
    .completed {
      text-decoration: line-through;
      opacity: 0.6;
      transition: all 0.2s ease;
    }

    /* 🔘 активный фильтр */
    .active-filter {
      background: #333;
    }

    /* ✨ появление */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ❌ удаление */
    .removing {
      animation: fadeOut 0.3s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(30px);
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>Список задач</h1>

    <div class="controls">
      <button onclick="setFilter('all')" id="filter-all">Все</button>
      <button onclick="setFilter('active')" id="filter-active">Активные</button>
      <button onclick="setFilter('completed')" id="filter-completed">Выполненные</button>
    </div>

    <input type="text" id="taskInput" placeholder="Новая задача">
    <button onclick="addTask()">Добавить</button>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>

</body>
</html>
