<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
      transition: 0.3s;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    h1 { text-align: center; }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;
      cursor: grab;
      transition: 0.2s;
    }

    li span {
      flex: 1;
      cursor: pointer;
    }

    .completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .removing {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(30px);
      }
    }

    .done-btn { background: #4CAF50; }
    .delete-btn { background: #ff4d4d; }

    .done-btn:hover { background: #45a049; }
    .delete-btn:hover { background: #e53935; }

    .controls button {
      background: #e0e0e0;
      color: black;
    }

    .controls button.active-filter {
      background: #4dabf7;
      color: white;
    }

    /* 🌙 DARK MODE */
    body.dark {
      background: #1e1e1e;
      color: white;
    }

    body.dark .app { background: #2a2a2a; }
    body.dark li { background: #3a3a3a; }
    body.dark input {
      background: #444;
      color: white;
      border: 1px solid #666;
    }

    body.dark .controls button {
      background: #444;
      color: white;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Список задач</h1>

  <div class="controls">
    <button onclick="setFilter('all')" id="filter-all">Все</button>
    <button onclick="setFilter('active')" id="filter-active">Активные</button>
    <button onclick="setFilter('completed')" id="filter-completed">Выполненные</button>
    <button onclick="toggleTheme()">🌙 / ☀️</button>
  </div>

  <input type="text" id="searchInput" placeholder="Поиск задач">
  <input type="text" id="taskInput" placeholder="Новая задача">
  <button onclick="addTask()" class="done-btn">Добавить</button>
  <button onclick="clearCompleted()" class="delete-btn">Очистить</button>

  <!-- 📊 СТАТИСТИКА -->
  <div id="stats" style="margin:10px 0;font-size:14px;"></div>

  <ul id="taskList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
