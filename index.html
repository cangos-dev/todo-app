<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;

      cursor: grab;

      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 0.25s ease forwards;

      transition: all 0.2s ease;
    }

    li:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    li:active {
      cursor: grabbing;
    }

    li span {
      flex: 1;
      word-break: break-word;
      line-height: 1.4;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    li button {
      background: #ff4d4d;
    }

    li button:first-child {
      background: #4CAF50;
    }

    .completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .active-filter {
      background: #333;
    }

    .removing {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(30px);
      }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Список задач</h1>

  <div class="controls">
    <button onclick="setFilter('all')" id="filter-all">Все</button>
    <button onclick="setFilter('active')" id="filter-active">Активные</button>
    <button onclick="setFilter('completed')" id="filter-completed">Выполненные</button>
  </div>

  <input type="text" id="searchInput" placeholder="Поиск задач">
  <input type="text" id="taskInput" placeholder="Новая задача">
  <button onclick="addTask()">Добавить</button>
  <button onclick="clearCompleted()">Очистить выполненные</button>

  <ul id="taskList"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
