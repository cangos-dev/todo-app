<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding-top: 50px;
      transition: 0.3s;
    }

    .app {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f9f9f9;
      cursor: grab;
      transition: 0.2s;
    }

    li span {
      flex: 1;
      cursor: pointer;
    }

    .completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .removing {
      animation: fadeOut 0.25s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(30px);
      }
    }

    /* КНОПКИ */
    .done-btn {
      background: #4CAF50;
    }

    .delete-btn {
      background: #ff4d4d;
    }

    .done-btn:hover {
      background: #45a049;
    }

    .delete-btn:hover {
      background: #e53935;
    }

    /* КНОПКИ ФИЛЬТРА */
    .controls button {
      background: #e0e0e0;
      color: #000;
    }

    .controls button:hover {
      background: #d5d5d5;
    }

    .active-filter {
      background: #4CAF50 !important;
      color: white;
    }

    /* 🌙 DARK MODE */
    body.dark {
      background: #1e1e1e;
      color: white;
    }

    body.dark .app {
      background: #2a2a2a;
    }

    body.dark li {
      background: #3a3a3a;
    }

    body.dark input {
      background: #444;
      color: white;
      border: 1px solid #666;
    }

    body.dark .controls button {
      background: #444;
      color: #fff;
    }

    body.dark .controls button:hover {
      background: #555;
    }

    body.dark .active-filter {
      background: #4CAF50 !important;
      color: white;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Список задач</h1>

  <div class="controls">
    <button id="filter-all" onclick="setFilter('all')">Все</button>
    <button id="filter-active" onclick="setFilter('active')">Активные</button>
    <button id="filter-completed" onclick="setFilter('completed')">Выполненные</button>
    <button onclick="toggleTheme()">🌙 / ☀️</button>
  </div>

  <input type="text" id="searchInput" placeholder="Поиск задач">
  <input type="text" id="taskInput" placeholder="Новая задача">
  <button onclick="addTask()" class="done-btn">Добавить</button>
  <button onclick="clearCompleted()" class="delete-btn">Очистить</button>

  <ul id="taskList"></ul>
</div>

<script>
const input = document.getElementById("taskInput");
const searchInput = document.getElementById("searchInput");
const list = document.getElementById("taskList");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

let history = [];
let future = [];

// загрузка
window.onload = () => {
  setFilter("all");
  input.focus();

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }
};

// сохранить
function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// история
function pushHistory() {
  history.push(JSON.stringify(tasks));
  future = [];
}

function restore(state) {
  tasks = JSON.parse(state);
  saveTasks();
  renderTasks();
}

// undo / redo
function undo() {
  if (!history.length) return;
  future.push(JSON.stringify(tasks));
  restore(history.pop());
}

function redo() {
  if (!future.length) return;
  history.push(JSON.stringify(tasks));
  restore(future.pop());
}

// добавить
function addTask() {
  const text = input.value.trim();
  if (!text) return;

  pushHistory();

  tasks.push({
    id: Date.now(),
    text,
    completed: false
  });

  saveTasks();
  renderTasks();

  input.value = "";
}

// удалить
function deleteTask(id) {
  const li = document.querySelector(`li[data-id="${id}"]`);

  if (li) {
    li.classList.add("removing");

    setTimeout(() => {
      pushHistory();

      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    }, 250);
  }
}

// выполнить
function toggleTask(id) {
  pushHistory();

  tasks = tasks.map(t =>
    t.id === id ? { ...t, completed: !t.completed } : t
  );

  saveTasks();
  renderTasks();
}

// редактирование
function editTask(id) {
  const li = document.querySelector(`li[data-id="${id}"]`);
  const task = tasks.find(t => t.id === id);

  const input = document.createElement("input");
  input.value = task.text;

  li.innerHTML = "";
  li.appendChild(input);

  input.focus();

  input.onkeydown = (e) => {
    if (e.key === "Enter") saveEdit(input, task);
    if (e.key === "Escape") renderTasks();
  };

  input.onblur = () => saveEdit(input, task);
}

function saveEdit(input, task) {
  const text = input.value.trim();
  if (!text) return renderTasks();

  pushHistory();

  task.text = text;
  saveTasks();
  renderTasks();
}

// очистка
function clearCompleted() {
  pushHistory();

  tasks = tasks.filter(t => !t.completed);
  saveTasks();
  renderTasks();
}

// фильтр
function setFilter(filter) {
  currentFilter = filter;

  document.querySelectorAll(".controls button")
    .forEach(btn => btn.classList.remove("active-filter"));

  const activeBtn = document.getElementById(`filter-${filter}`);
  if (activeBtn) activeBtn.classList.add("active-filter");

  renderTasks();
}

// фильтрация
function getTasks() {
  let result = tasks;

  if (currentFilter === "active") {
    result = result.filter(t => !t.completed);
  }

  if (currentFilter === "completed") {
    result = result.filter(t => t.completed);
  }

  const search = searchInput.value.toLowerCase();

  if (search) {
    result = result.filter(t =>
      t.text.toLowerCase().includes(search)
    );
  }

  return result;
}

// рендер
function renderTasks() {
  list.innerHTML = "";

  getTasks().forEach(task => {
    const li = document.createElement("li");
    li.dataset.id = task.id;

    const doneBtn = document.createElement("button");
    doneBtn.textContent = "✔";
    doneBtn.className = "done-btn";
    doneBtn.onclick = () => toggleTask(task.id);

    const span = document.createElement("span");
    span.textContent = task.text;
    span.ondblclick = () => editTask(task.id);

    if (task.completed) li.classList.add("completed");

    const delBtn = document.createElement("button");
    delBtn.textContent = "✖";
    delBtn.className = "delete-btn";
    delBtn.onclick = () => deleteTask(task.id);

    li.append(doneBtn, span, delBtn);
    list.appendChild(li);
  });
}

// тема
function toggleTheme() {
  document.body.classList.toggle("dark");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}

// клавиши
document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "z") {
    e.preventDefault();
    undo();
  }

  if (e.ctrlKey && e.key === "y") {
    e.preventDefault();
    redo();
  }
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") addTask();
});

searchInput.addEventListener("input", renderTasks);
</script>

</body>
</html>
